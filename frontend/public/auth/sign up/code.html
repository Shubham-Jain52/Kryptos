<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kryptos | Secure Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800&amp;family=Inter:wght@300;400;500;600&amp;family=Newsreader:opsz,wght@6..72,400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#393939",
              "inverse-primary": "#b32a00",
              "primary-container": "#fd582d",
              "on-secondary-container": "#b6b9b7",
              "surface-container-high": "#2a2a2a",
              "on-surface-variant": "#e4beb5",
              "on-primary-fixed": "#3c0800",
              "outline": "#ab8981",
              "on-secondary-fixed-variant": "#444746",
              "surface-container": "#201f1f",
              "surface-container-lowest": "#0e0e0e",
              "primary": "#ffb4a1",
              "on-tertiary-fixed-variant": "#444746",
              "surface-tint": "#ffb4a1",
              "outline-variant": "#5b403a",
              "surface-variant": "#353535",
              "on-primary-container": "#550f00",
              "on-surface": "#e5e2e1",
              "on-tertiary-container": "#272a29",
              "on-secondary-fixed": "#191c1b",
              "surface-container-low": "#1c1b1b",
              "on-tertiary-fixed": "#191c1b",
              "background": "#131313",
              "tertiary-fixed-dim": "#c5c7c5",
              "surface": "#131313",
              "inverse-surface": "#e5e2e1",
              "surface-dim": "#131313",
              "on-secondary": "#2e3130",
              "on-error": "#690005",
              "tertiary": "#c5c7c5",
              "secondary-fixed-dim": "#c5c7c5",
              "error-container": "#93000a",
              "on-primary-fixed-variant": "#891e00",
              "tertiary-fixed": "#e1e3e1",
              "inverse-on-surface": "#313030",
              "error": "#ffb4ab",
              "primary-fixed-dim": "#ffb4a1",
              "secondary-container": "#474a48",
              "on-tertiary": "#2e3130",
              "on-background": "#e5e2e1",
              "secondary": "#c5c7c5",
              "tertiary-container": "#8f9190",
              "secondary-fixed": "#e1e3e1",
              "primary-fixed": "#ffdbd2",
              "on-error-container": "#ffdad6",
              "on-primary": "#611200",
              "surface-container-highest": "#353535"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"],
              "display": ["Newsreader"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .radial-glow-orange {
            background: radial-gradient(circle, rgba(241, 80, 37, 0.15) 0%, rgba(19, 19, 19, 0) 70%);
        }
        .radial-glow-grey {
            background: radial-gradient(circle, rgba(230, 232, 230, 0.1) 0%, rgba(19, 19, 19, 0) 70%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-[#131313] font-body text-on-surface min-h-screen selection:bg-primary/30 relative overflow-x-hidden">
<!-- Asymmetrical Radial Gradients -->
<div class="fixed -top-[20%] -left-[10%] w-[80vw] h-[80vw] radial-glow-orange pointer-events-none z-0"></div>
<div class="fixed -bottom-[20%] -right-[10%] w-[70vw] h-[70vw] radial-glow-grey pointer-events-none z-0"></div>
<!-- Main Navigation (Suppressed/Minimal for Task Focus) -->
<header class="fixed top-0 w-full flex items-center justify-between px-12 py-8 z-50">
<div class="flex items-center gap-2">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container-highest border border-outline-variant/20">
<span class="text-primary font-headline font-extrabold text-2xl tracking-tighter">K</span>
</div>
<span class="font-headline font-bold text-xl tracking-tighter text-on-surface">Kryptos</span>
</div>
<a class="font-label text-sm uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">
            Sign In
        </a>
</header>
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-6 py-24">
<!-- Registration Container -->
<div class="w-full max-w-xl glass-morphism rounded-[2rem] p-10 md:p-16 shadow-2xl">
<!-- Branding & Header -->
<div class="flex flex-col items-center text-center mb-12">
<div class="mb-6 relative">
<div class="absolute inset-0 bg-primary/20 blur-xl rounded-full"></div>
<span class="material-symbols-outlined text-primary text-5xl relative" data-icon="fingerprint" style="font-variation-settings: 'wght' 200;">fingerprint</span>
</div>
<h1 class="font-display text-5xl md:text-6xl text-white mb-2 italic">Join Kryptos</h1>
<p class="font-headline text-on-surface-variant tracking-widest text-sm uppercase font-light">The Precision of Care</p>
</div>
<!-- Form -->
<form class="space-y-8">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="text-xs uppercase tracking-widest text-on-surface-variant/70 ml-1 font-semibold">Full Name</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-1 focus:ring-primary/40 transition-all duration-300 outline-none" placeholder="Dr. Julian Thorne" type="text"/>
</div>
</div>
<!-- Medical Institution -->
<div class="flex flex-col gap-2">
<label class="text-xs uppercase tracking-widest text-on-surface-variant/70 ml-1 font-semibold">Medical Institution</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-1 focus:ring-primary/40 transition-all duration-300 outline-none" placeholder="Mayo Clinic Central" type="text"/>
</div>
</div>
</div>
<!-- Professional Email -->
<div class="flex flex-col gap-2">
<label class="text-xs uppercase tracking-widest text-on-surface-variant/70 ml-1 font-semibold">Professional Email</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-1 focus:ring-primary/40 transition-all duration-300 outline-none" placeholder="j.thorne@medical-ai.org" type="email"/>
</div>
</div>
<!-- Set Security Key -->
<div class="flex flex-col gap-2">
<label class="text-xs uppercase tracking-widest text-on-surface-variant/70 ml-1 font-semibold">Set Security Key</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-1 focus:ring-primary/40 transition-all duration-300 outline-none" placeholder="••••••••••••••••" type="password"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40">
<span class="material-symbols-outlined" data-icon="lock" style="font-variation-settings: 'wght' 200;">lock</span>
</div>
</div>
</div>
<!-- CTA -->
<button class="w-full bg-[#E6E8E6] hover:bg-white text-[#131313] font-headline font-bold py-5 rounded-xl transition-all duration-300 shadow-lg shadow-white/5 active:scale-[0.98] uppercase tracking-tighter text-lg mt-4" type="submit">
                    Create Secure Account
                </button>
</form>
<!-- Trust Indicators -->
<div class="mt-12 flex flex-wrap justify-center gap-8 items-center border-t border-outline-variant/10 pt-10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary/60 text-xl" data-icon="verified_user">verified_user</span>
<span class="text-[10px] md:text-xs font-label uppercase tracking-[0.2em] text-on-surface-variant/60">HIPAA Compliant</span>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary/60 text-xl" data-icon="encrypted">encrypted</span>
<span class="text-[10px] md:text-xs font-label uppercase tracking-[0.2em] text-on-surface-variant/60">Zero-Knowledge Encryption</span>
</div>
</div>
</div>
<!-- Footer Decoration / Identity -->
<div class="mt-12 flex flex-col items-center gap-4 text-center">
<p class="text-[10px] text-on-surface-variant/40 uppercase tracking-[0.3em] font-light">Kryptos Medical Intelligence © 2024</p>
<div class="flex gap-6">
<a class="text-[10px] text-on-surface-variant/30 hover:text-on-surface transition-colors uppercase tracking-widest" href="#">Privacy Protocol</a>
<a class="text-[10px] text-on-surface-variant/30 hover:text-on-surface transition-colors uppercase tracking-widest" href="#">Legal Architecture</a>
</div>
</div>
</main>
<!-- Aesthetic Layering: Floating Light Beams -->
<div class="fixed top-1/4 left-1/4 w-32 h-96 bg-primary/5 blur-[100px] -rotate-45 pointer-events-none"></div>
<div class="fixed bottom-1/4 right-1/4 w-48 h-[500px] bg-secondary/5 blur-[120px] rotate-12 pointer-events-none"></div>
</body></html>
